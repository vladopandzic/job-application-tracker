# Build, test, and deploy JobTrek to MonsterASP.NET on every push to master.
#
# MonsterASP hosts .NET Core natively (IIS) — it does NOT build source, so we build + publish here
# and push the compiled output with Web Deploy.
#
# App = TWO hosts (API + Web/Blazor Server) -> one MonsterASP website each:
#   Web -> jobtrek.runasp.net       API -> jobtrek-api.runasp.net
#
# Note: the Aspire AppHost project (local-dev orchestration only) is NOT built here — the newer SDK
# errors on its deprecated Aspire workload, and it isn't needed for tests or deployment.
#
# ---- Required GitHub secrets (Settings -> Secrets and variables -> Actions -> Secrets) ----
# Secrets live encrypted in GitHub, injected at deploy — NEVER in the repo.
# Per site, from MonsterASP: Manage site -> Deploy -> "WebDeploy access":
#   MONSTERASP_WEB_SERVER / MONSTERASP_WEB_USERNAME / MONSTERASP_WEB_PASSWORD / MONSTERASP_WEB_SITE
#   MONSTERASP_API_SERVER / MONSTERASP_API_USERNAME / MONSTERASP_API_PASSWORD / MONSTERASP_API_SITE
# App runtime config:
#   DB_CONNECTION_STRING   the MSSQL connection string incl. password (from your MonsterASP DB)
#   JWT_SECRET             a strong random secret, e.g. `openssl rand -base64 64`
#   BASE_API_URL           https://jobtrek-api.runasp.net   (public URL of the API, used by the Web)
#   SEED_ADMIN_EMAIL / SEED_ADMIN_PASSWORD   bootstrap admin (employee) login, created on API startup
# Email (transactional SMTP, e.g. Brevo — free, no domain, verify a single sender):
#   SMTP_HOST        e.g. smtp-relay.brevo.com
#   SMTP_PORT        587
#   SMTP_USERNAME    your Brevo SMTP login
#   SMTP_PASSWORD    your Brevo SMTP key (NOT the account password)
#   SMTP_FROM_EMAIL  the verified sender address (e.g. your Gmail)

name: Build, test & deploy (MonsterASP)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Unit & architecture tests
        run: |
          dotnet test test/Procoding.ApplicationTracker.Domain.Tests/Procoding.ApplicationTracker.Domain.Tests.csproj -c Release
          dotnet test test/Procoding.ApplicationTracker.Application.Tests/Procoding.ApplicationTracker.Application.Tests.csproj -c Release
          dotnet test test/Procoding.ApplicationTracker.Web.Tests/Procoding.ApplicationTracker.Web.Tests.csproj -c Release
          dotnet test test/Procoding.Architecture.Tests/Procoding.Architecture.Tests.csproj -c Release
    # Integration tests (test/...Api.IntegrationTests) use Docker/Testcontainers — add a separate
    # job with a Docker service if you want them in CI.

  deploy_web:
    name: Deploy Web (Blazor)
    needs: build_and_test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Web
        run: dotnet publish src/Procoding.ApplicationTracker.Web.Root/Procoding.ApplicationTracker.Web.Root.csproj -c Release -o publish-web

      - name: Inject production config (secret -> appsettings.Production.json)
        shell: pwsh
        env:
          BASE_API_URL: ${{ secrets.BASE_API_URL }}
        run: |
          @{ BaseApiUrl = $env:BASE_API_URL } | ConvertTo-Json | Set-Content publish-web/appsettings.Production.json -Encoding utf8

      - name: Web Deploy -> MonsterASP (Web)
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_WEB_SITE }}
          # MonsterASP WebDeploy endpoint = full URL WITH scheme + IIS WMSvc port 8172.
          # Built from the site id (siteXXXX) so a bare-host secret can't break it.
          server-computer-name: https://${{ secrets.MONSTERASP_WEB_SITE }}.siteasp.net:8172
          # WebDeploy login == site id (siteXXXX), so derive it too — only the password secret matters.
          server-username: ${{ secrets.MONSTERASP_WEB_SITE }}
          server-password: ${{ secrets.MONSTERASP_WEB_PASSWORD }}
          source-path: publish-web

  deploy_api:
    name: Deploy API
    needs: build_and_test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: dotnet publish src/Procoding.ApplicationTracker.Api/Procoding.ApplicationTracker.Api.csproj -c Release -o publish-api

      - name: Inject production config (secrets -> appsettings.Production.json)
        shell: pwsh
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          $smtpPort = if ($env:SMTP_PORT) { [int]$env:SMTP_PORT } else { 587 }
          @{
            DatabaseProvider = "SqlServer"
            ConnectionStrings = @{ JobApplicationDatabase = $env:DB_CONNECTION_STRING }
            EmployeeJwtTokenSettings = @{ SecretKey = $env:JWT_SECRET }
            CandidateJwtTokenSettings = @{ SecretKey = $env:JWT_SECRET }
            SeedAdmin = @{ Email = $env:SEED_ADMIN_EMAIL; Password = $env:SEED_ADMIN_PASSWORD; FirstName = "Vlado"; LastName = "Pandzic" }
            Email = @{
              Enabled = $true
              Host = $env:SMTP_HOST
              Port = $smtpPort
              Username = $env:SMTP_USERNAME
              Password = $env:SMTP_PASSWORD
              FromEmail = $env:SMTP_FROM_EMAIL
              FromName = "JobTrek"
              UseStartTls = $true
            }
            Gemini = @{ ApiKey = $env:GEMINI_API_KEY; Model = "gemini-2.5-flash" }
          } | ConvertTo-Json -Depth 5 | Set-Content publish-api/appsettings.Production.json -Encoding utf8

      - name: Web Deploy -> MonsterASP (API)
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_API_SITE }}
          # MonsterASP WebDeploy endpoint = full URL WITH scheme + IIS WMSvc port 8172.
          # Built from the site id (siteXXXX) so a bare-host secret can't break it.
          server-computer-name: https://${{ secrets.MONSTERASP_API_SITE }}.siteasp.net:8172
          # WebDeploy login == site id (siteXXXX), so derive it too — only the password secret matters.
          server-username: ${{ secrets.MONSTERASP_API_SITE }}
          server-password: ${{ secrets.MONSTERASP_API_PASSWORD }}
          source-path: publish-api
