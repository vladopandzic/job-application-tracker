# Deploy JobTrek to MonsterASP.NET via Web Deploy on every push to master.
#
# MonsterASP hosts .NET Core natively (IIS) — it does NOT build source, so we build + publish here
# and push the compiled output with Web Deploy. This is the reliable path (unlike the panel's
# "GitHub Deploy" which only syncs source files).
#
# App = TWO hosts (API + Web/Blazor Server). You need a MonsterASP website per app:
#   - Free plan = 1 website  -> deploy ONE app; the other needs a 2nd site (or merge the two).
#   - Premium Multi ($7/mo)  -> up to 10 sites -> run both jobs below.
#
# ---- Required GitHub repository secrets (Settings -> Secrets and variables -> Actions) ----
# Secrets live encrypted in GitHub and are injected at deploy time — they are NEVER in the repo.
#
# WebDeploy (from MonsterASP: Manage site -> "WebDeploy" -> activate + download .publishSettings):
#   MONSTERASP_SERVER      e.g. site77745.siteasp.net   (the msdeploy computer name / server)
#   MONSTERASP_USERNAME    WebDeploy username
#   MONSTERASP_PASSWORD    WebDeploy password
#   MONSTERASP_WEB_SITE    website name for the Blazor Web app (e.g. site77745)
#   MONSTERASP_API_SITE    website name for the API (only if you use a 2nd site)
#
# App runtime config (written into appsettings.Production.json at deploy — never committed):
#   DB_CONNECTION_STRING   the MSSQL connection string incl. password (from your MonsterASP DB)
#   JWT_SECRET             a strong random secret, e.g. `openssl rand -base64 64`
#   BASE_API_URL           the public URL of the deployed API (used by the Web app)

name: Deploy to MonsterASP

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Publish & deploy Web (Blazor)
    runs-on: windows-latest
    if: ${{ vars.DEPLOY_WEB != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Web
        run: dotnet publish src/Procoding.ApplicationTracker.Web.Root/Procoding.ApplicationTracker.Web.Root.csproj -c Release -o publish-web

      - name: Inject production config (secret -> appsettings.Production.json)
        shell: pwsh
        env:
          BASE_API_URL: ${{ secrets.BASE_API_URL }}
        run: |
          @{ BaseApiUrl = $env:BASE_API_URL } | ConvertTo-Json | Set-Content publish-web/appsettings.Production.json -Encoding utf8

      - name: Web Deploy -> MonsterASP
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_WEB_SITE }}
          server-computer-name: ${{ secrets.MONSTERASP_SERVER }}
          server-username: ${{ secrets.MONSTERASP_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_PASSWORD }}
          source-path: publish-web

  # Enable this job once you have a SECOND MonsterASP site for the API (Premium Multi or a 2nd free site).
  deploy-api:
    name: Publish & deploy API
    runs-on: windows-latest
    if: ${{ vars.DEPLOY_API == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: dotnet publish src/Procoding.ApplicationTracker.Api/Procoding.ApplicationTracker.Api.csproj -c Release -o publish-api

      - name: Inject production config (secrets -> appsettings.Production.json)
        shell: pwsh
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          @{
            DatabaseProvider = "SqlServer"
            ConnectionStrings = @{ JobApplicationDatabase = $env:DB_CONNECTION_STRING }
            EmployeeJwtTokenSettings = @{ SecretKey = $env:JWT_SECRET }
            CandidateJwtTokenSettings = @{ SecretKey = $env:JWT_SECRET }
          } | ConvertTo-Json -Depth 5 | Set-Content publish-api/appsettings.Production.json -Encoding utf8

      - name: Web Deploy -> MonsterASP
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_API_SITE }}
          server-computer-name: ${{ secrets.MONSTERASP_SERVER }}
          server-username: ${{ secrets.MONSTERASP_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_PASSWORD }}
          source-path: publish-api
